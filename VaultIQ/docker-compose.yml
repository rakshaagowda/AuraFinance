version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend-uploads:/app/uploads
      - backend-chroma:/app/chroma_db
      - backend-sqlite:/app
    environment:
      - UPLOAD_DIR=/app/uploads
      - CHROMA_DIR=/app/chroma_db
      - SQLITE_DB_PATH=/app/vaultiq.db
      - JWT_SECRET_KEY=vaultiq_docker_composed_secret_key_production_2026!
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-uploads:
  backend-chroma:
  backend-sqlite:
